<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Dice Roller</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            display: block;
        }
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #button-bar {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            pointer-events: all;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 600px;
        }
        .dice-btn {
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            letter-spacing: 1px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
        }
        .dice-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .dice-btn:active {
            transform: scale(0.97);
        }
        #result-display {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 56px;
            font-weight: bold;
            color: #f1c40f;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
            opacity: 0;
            transition: opacity 0.5s;
            white-space: nowrap;
            pointer-events: none;
        }
        #instruction {
            position: absolute;
            bottom: 55px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            color: #888;
            letter-spacing: 0.5px;
            pointer-events: none;
            white-space: nowrap;
        }
        #controls-hint {
            position: absolute;
            top: 80px;
            right: 20px;
            font-size: 13px;
            color: #555;
            text-align: right;
            line-height: 1.8;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="ui-overlay">
        <div id="button-bar"></div>
        <div id="result-display"></div>
        <div id="instruction">Click a die button to roll</div>
        <div id="controls-hint">
            Drag to rotate view<br>
            Scroll to zoom
        </div>
    </div>

    <script src="three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 12, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 10);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        directionalLight.shadow.camera.near = 0.5;
        directionalLight.shadow.camera.far = 60;
        directionalLight.shadow.camera.left = -15;
        directionalLight.shadow.camera.right = 15;
        directionalLight.shadow.camera.top = 15;
        directionalLight.shadow.camera.bottom = -15;
        scene.add(directionalLight);

        const pointLight = new THREE.PointLight(0x4466ff, 0.4, 30);
        pointLight.position.set(-8, 10, -8);
        scene.add(pointLight);

        // Tray
        const trayGeometry = new THREE.BoxGeometry(16, 1, 16);
        const trayMaterial = new THREE.MeshStandardMaterial({ color: 0x4a3728, roughness: 0.8 });
        const tray = new THREE.Mesh(trayGeometry, trayMaterial);
        tray.position.y = -0.5;
        tray.receiveShadow = true;
        scene.add(tray);

        const innerTrayGeometry = new THREE.BoxGeometry(14, 0.5, 14);
        const innerTrayMaterial = new THREE.MeshStandardMaterial({ color: 0x2d1f14, roughness: 0.9 });
        const innerTray = new THREE.Mesh(innerTrayGeometry, innerTrayMaterial);
        innerTray.position.y = 0;
        innerTray.receiveShadow = true;
        scene.add(innerTray);

        // Tray walls (low, visible edges)
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x5a4030, roughness: 0.7 });
        const wallConfigs = [
            { size: [16, 1.5, 0.5], pos: [0, 0.25, -8] },
            { size: [16, 1.5, 0.5], pos: [0, 0.25,  8] },
            { size: [0.5, 1.5, 16], pos: [-8, 0.25, 0] },
            { size: [0.5, 1.5, 16], pos: [ 8, 0.25, 0] },
        ];
        wallConfigs.forEach(({ size, pos }) => {
            const wall = new THREE.Mesh(new THREE.BoxGeometry(...size), wallMat);
            wall.position.set(...pos);
            wall.receiveShadow = true;
            wall.castShadow = true;
            scene.add(wall);
        });

        // Gravity constant
        const GRAVITY = -0.025;

        const FLOOR_Y    = 0.25;  // top surface of innerTray
        const WALL_INNER = 7.75;  // inner face of tray walls (wall center ±8, thickness 0.5)

        let currentDice = null;
        let currentRadius = 1.5;
        let diceVelocity = { x: 0, y: 0, z: 0 };
        let angularVelocity = { x: 0, y: 0, z: 0 };
        let isRolling = false;
        let rollResult = 0;
        let currentDiceType = null;
        let rollTimeout = null;

        function createD4() {
            const geometry = new THREE.TetrahedronGeometry(1.5);
            const material = new THREE.MeshStandardMaterial({ color: 0xe74c3c, roughness: 0.3, metalness: 0.1, flatShading: true });
            return new THREE.Mesh(geometry, material);
        }

        function createD6() {
            const geometry = new THREE.BoxGeometry(1.5, 1.5, 1.5);
            const material = new THREE.MeshStandardMaterial({ color: 0x2c3e50, roughness: 0.2, metalness: 0.1 });
            return new THREE.Mesh(geometry, material);
        }

        function createD8() {
            const geometry = new THREE.OctahedronGeometry(1.5);
            const material = new THREE.MeshStandardMaterial({ color: 0xf39c12, roughness: 0.3, metalness: 0.1, flatShading: true });
            return new THREE.Mesh(geometry, material);
        }

        function createD10() {
            const geometry = new THREE.DodecahedronGeometry(1.3);
            const material = new THREE.MeshStandardMaterial({ color: 0x9b59b6, roughness: 0.3, metalness: 0.1, flatShading: true });
            return new THREE.Mesh(geometry, material);
        }

        function createD12() {
            const geometry = new THREE.DodecahedronGeometry(1.5);
            const material = new THREE.MeshStandardMaterial({ color: 0x1abc9c, roughness: 0.3, metalness: 0.1, flatShading: true });
            return new THREE.Mesh(geometry, material);
        }

        function createD20() {
            const geometry = new THREE.IcosahedronGeometry(1.5);
            const material = new THREE.MeshStandardMaterial({ color: 0x3498db, roughness: 0.2, metalness: 0.2, flatShading: true });
            return new THREE.Mesh(geometry, material);
        }

        // radius = bounding sphere radius used for collision detection
        const diceTypes = {
            'D4':  { sides: 4,  create: createD4,  color: 0xe74c3c, radius: 1.50 },
            'D6':  { sides: 6,  create: createD6,  color: 0x2c3e50, radius: 1.30 }, // sqrt(3)*0.75
            'D8':  { sides: 8,  create: createD8,  color: 0xf39c12, radius: 1.50 },
            'D10': { sides: 10, create: createD10, color: 0x9b59b6, radius: 1.30 },
            'D12': { sides: 12, create: createD12, color: 0x1abc9c, radius: 1.50 },
            'D20': { sides: 20, create: createD20, color: 0x3498db, radius: 1.50 },
        };

        // Build button bar
        const buttonBar = document.getElementById('button-bar');
        const resultDisplay = document.getElementById('result-display');

        Object.entries(diceTypes).forEach(([name, info]) => {
            const btn = document.createElement('button');
            btn.textContent = name;
            btn.className = 'dice-btn';
            btn.style.background = '#' + info.color.toString(16).padStart(6, '0');
            btn.addEventListener('click', () => rollDice(name));
            buttonBar.appendChild(btn);
        });

        // D% button
        const dPctBtn = document.createElement('button');
        dPctBtn.textContent = 'D%';
        dPctBtn.className = 'dice-btn';
        dPctBtn.style.background = '#e67e22';
        dPctBtn.addEventListener('click', () => rollDice('D10', true));
        buttonBar.appendChild(dPctBtn);

        function rollDice(type, isPercent = false) {
            if (rollTimeout) clearTimeout(rollTimeout);

            if (currentDice) {
                scene.remove(currentDice);
                currentDice = null;
            }

            const diceType = diceTypes[type];
            currentDice = diceType.create();
            currentDice.castShadow = true;
            currentDiceType = type;
            currentRadius = diceType.radius;

            currentDice.position.set(
                (Math.random() - 0.5) * 4,
                9,
                (Math.random() - 0.5) * 4
            );
            scene.add(currentDice);

            const speed = 0.25 + Math.random() * 0.2;
            const angle = Math.random() * Math.PI * 2;
            diceVelocity = {
                x: Math.cos(angle) * speed,
                y: -0.2,
                z: Math.sin(angle) * speed
            };

            angularVelocity = {
                x: (Math.random() - 0.5) * 0.5,
                y: (Math.random() - 0.5) * 0.5,
                z: (Math.random() - 0.5) * 0.5
            };

            isRolling = true;
            resultDisplay.style.opacity = '0';

            const raw = Math.floor(Math.random() * diceType.sides) + 1;
            rollResult = raw;

            rollTimeout = setTimeout(() => {
                isRolling = false;
                if (isPercent) {
                    // D% shows tens digit of a d10 roll (0-90) + separate d10 (1-10)
                    const tens = (Math.floor(Math.random() * 10)) * 10;
                    const units = Math.floor(Math.random() * 10) + 1;
                    const total = tens + units > 100 ? 100 : tens + units === 0 ? 100 : tens + units;
                    resultDisplay.textContent = `D%: ${total}`;
                } else {
                    resultDisplay.textContent = `${type}: ${rollResult}`;
                }
                resultDisplay.style.opacity = '1';
            }, 2200);
        }

        // Camera orbit controls
        let cameraAngle = 0;
        let cameraRadius = 20;
        let targetCameraAngle = 0;
        let targetCameraRadius = 20;
        let cameraElevation = 12;
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };

        renderer.domElement.addEventListener('mousedown', (e) => {
            isDragging = true;
            previousMousePosition = { x: e.clientX, y: e.clientY };
        });

        renderer.domElement.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const deltaX = e.clientX - previousMousePosition.x;
            targetCameraAngle -= deltaX * 0.01;
            previousMousePosition = { x: e.clientX, y: e.clientY };
        });

        window.addEventListener('mouseup', () => { isDragging = false; });

        renderer.domElement.addEventListener('wheel', (e) => {
            e.preventDefault();
            targetCameraRadius += e.deltaY * 0.02;
            targetCameraRadius = Math.max(10, Math.min(40, targetCameraRadius));
        }, { passive: false });

        // Touch support
        let lastTouchX = 0;
        renderer.domElement.addEventListener('touchstart', (e) => {
            lastTouchX = e.touches[0].clientX;
        });
        renderer.domElement.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const dx = e.touches[0].clientX - lastTouchX;
            targetCameraAngle -= dx * 0.01;
            lastTouchX = e.touches[0].clientX;
        }, { passive: false });

        function updatePhysics() {
            if (!currentDice || !isRolling) return;

            diceVelocity.y += GRAVITY;

            currentDice.position.x += diceVelocity.x;
            currentDice.position.y += diceVelocity.y;
            currentDice.position.z += diceVelocity.z;

            currentDice.rotation.x += angularVelocity.x;
            currentDice.rotation.y += angularVelocity.y;
            currentDice.rotation.z += angularVelocity.z;

            // Floor collision — stop at floor surface + die radius so no clipping
            const floorStop = FLOOR_Y + currentRadius;
            if (currentDice.position.y < floorStop) {
                currentDice.position.y = floorStop;
                diceVelocity.y = -diceVelocity.y * 0.5;
                diceVelocity.x *= 0.82;
                diceVelocity.z *= 0.82;
                angularVelocity.x *= 0.85;
                angularVelocity.y *= 0.85;
                angularVelocity.z *= 0.85;

                if (Math.abs(diceVelocity.y) < 0.05) diceVelocity.y = 0;
            }

            // Wall collisions — stop before inner wall face minus die radius
            const wallStop = WALL_INNER - currentRadius;
            if (Math.abs(currentDice.position.x) > wallStop) {
                currentDice.position.x = Math.sign(currentDice.position.x) * wallStop;
                diceVelocity.x *= -0.65;
            }
            if (Math.abs(currentDice.position.z) > wallStop) {
                currentDice.position.z = Math.sign(currentDice.position.z) * wallStop;
                diceVelocity.z *= -0.65;
            }

            // Dampen tiny velocities
            const thresh = 0.001;
            if (Math.abs(diceVelocity.x) < thresh) diceVelocity.x = 0;
            if (Math.abs(diceVelocity.z) < thresh) diceVelocity.z = 0;
        }

        function animate() {
            requestAnimationFrame(animate);

            cameraAngle  += (targetCameraAngle  - cameraAngle)  * 0.06;
            cameraRadius += (targetCameraRadius - cameraRadius) * 0.06;

            camera.position.x = Math.sin(cameraAngle) * cameraRadius;
            camera.position.z = Math.cos(cameraAngle) * cameraRadius;
            camera.position.y = 10 + cameraRadius * 0.15;
            camera.lookAt(0, 1, 0);

            updatePhysics();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
